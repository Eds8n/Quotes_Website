<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Monde des Citations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quote-box">
        <h2>Citation du jour</h2>
        <blockquote id="quote">Loading...</blockquote>
        <span id="author">Loading...</span>
       <div>
        <button id="newQuoteBtn">Nouvelle Citation</button>
        <button id="readingBtn">Écouter la Citation</button>
        <button id="themeBtn">Mode Sombre/Clair</button>
        </div>
    <div class="button-row">
            <button id="musicBtn">🎵 Musique</button>
        </div>

        <!-- Audio caché, contrôlé par le bouton musique -->
        <audio id="myAudio" src="musique/Hans-Zimmer.mp3"></audio>
    </div>
    <script src="/script.js"></script> 
</body>
</html>
